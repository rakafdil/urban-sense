services:
  dev-db:
    image: postgres:17
    ports:
      - 5434:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: nest
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    networks:
      - schedule-helper

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:123@dev-db:5432/nest?schema=public
      - JWT_SECRET=supersecretkey
      - JWT_EXPIRES_IN=1d
      - AI_API=http://host.docker.internal:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - dev-db
    networks:
      - schedule-helper

  test-db:
    image: postgres:18
    ports:
      - 5435:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: nest
    volumes:
      - test-db-data:/var/lib/postgresql/data
    networks:
      - schedule-helper

volumes:
  dev-db-data:
  test-db-data:

networks:
  schedule-helper:
